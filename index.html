            const rowIdx = i + headerRowsCount;
            const name = cellDataStorage[`${rowIdx}-B`] || "";
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="col-a record-sticky-left">${i}</td><td class="col-b record-sticky-left2" style="border-right: 2px solid red;">${name}</td>`;
            
            let iinkaiVal = cellDataStorage[`shoken_${term}_${rowIdx}_委員会`];
            if (iinkaiVal === undefined && (term === "2学期" || term === "3学期")) {
                iinkaiVal = cellDataStorage[`shoken_1学期_${rowIdx}_委員会`] || "";
            } else if (iinkaiVal === undefined) iinkaiVal = "";

            let clubVal = cellDataStorage[`shoken_${term}_${rowIdx}_クラブ`];
            if (clubVal === undefined && (term === "2学期" || term === "3学期")) {
                clubVal = cellDataStorage[`shoken_1学期_${rowIdx}_クラブ`] || "";
            } else if (clubVal === undefined) clubVal = "";

            let kakariVal = cellDataStorage[`shoken_${term}_${rowIdx}_係活動`] !== undefined ? cellDataStorage[`shoken_${term}_${rowIdx}_係活動`] : "";

            let parts = [];
            if (iinkaiVal.trim() !== "") parts.push(iinkaiVal.trim());
            if (clubVal.trim() !== "") parts.push(clubVal.trim());
            if (kakariVal.trim() !== "") parts.push(kakariVal.trim());
            let combinedVal = parts.length > 0 ? `【${term}】 ${parts.join(', ')}` : "";

            const vals = [iinkaiVal, clubVal, kakariVal, combinedVal];

            items.forEach((item, colIndex) => {
                let border = (item === "係活動") ? 'border-right: 2px solid black;' : ((item === "まとめ") ? '' : 'border-right: 1px solid #ccc;');
                let readonly = (item === "まとめ") ? 'readonly' : '';
                let bg = (item === "まとめ") ? 'background-color: #f9f9f9; color: #444;' : '';
                tr.innerHTML += `<td style="${border} padding: 0; ${bg}">
                    <input type="text" class="select-cell shoken-cell toku-cell" data-student="${rowIdx}" data-item="${item}" data-colidx="${colIndex}" value="${vals[colIndex]}" ${readonly} style="width: 100%; height: 100%; min-height: 40px; font-family: 'MS Gothic', 'Osaka－等幅', monospace; font-size: 1.00rem; text-align: left; padding: 5px 10px; box-sizing: border-box; border: none; outline: none; background: transparent;">
                </td>`;
            });
            body.appendChild(tr);
        }

        body.querySelectorAll('.toku-cell').forEach(inp => {
            if (inp.dataset.item !== "まとめ") {
                inp.addEventListener('input', (e) => {
                    const { student, item } = e.target.dataset;
                    cellDataStorage[`shoken_${term}_${student}_${item}`] = e.target.value;
                    autoSave();
                    
                    const rowIdx = student;
                    const iinkai = document.querySelector(`.toku-cell[data-student="${rowIdx}"][data-item="委員会"]`).value.trim();
                    const club = document.querySelector(`.toku-cell[data-student="${rowIdx}"][data-item="クラブ"]`).value.trim();
                    const kakari = document.querySelector(`.toku-cell[data-student="${rowIdx}"][data-item="係活動"]`).value.trim();
                    let parts = [];
                    if (iinkai) parts.push(iinkai);
                    if (club) parts.push(club);
                    if (kakari) parts.push(kakari);
                    let combined = parts.length > 0 ? `【${term}】 ${parts.join(', ')}` : "";
                    const combinedInput = document.querySelector(`.toku-cell[data-student="${rowIdx}"][data-item="まとめ"]`);
                    if (combinedInput) combinedInput.value = combined;
                });
            }

            inp.addEventListener('keydown', (e) => {
                if (e.isComposing) return;
                const r = parseInt(inp.dataset.student);
                const c = parseInt(inp.dataset.colidx);
                let nr = r; let nc = c;
                if (e.key === 'Enter' || e.key === 'ArrowDown') { e.preventDefault(); nr++; }
                else if (e.key === 'ArrowUp') { e.preventDefault(); nr--; }
                else if (e.key === 'ArrowRight') { e.preventDefault(); nc++; }
                else if (e.key === 'ArrowLeft') { e.preventDefault(); nc--; }
                if (nr !== r || nc !== c) {
                    const n = document.querySelector(`.toku-cell[data-student="${nr}"][data-colidx="${nc}"]`);
                    if (n) { n.focus(); if (n.select) n.select(); } else if ((e.key === 'Enter' || e.key === 'ArrowDown') && nr > studentCount + headerRowsCount) showSuccess();
                }
            });
            inp.addEventListener('mousedown', (e) => {
                if (e.button !== 0 && e.button !== 2) return;
                isSelecting = true;
                startCell = { r: parseInt(inp.dataset.student), c: parseInt(inp.dataset.colidx) };
                
                if (e.button === 2 && inp.classList.contains('selected')) return;

                if (!e.shiftKey) document.querySelectorAll('.toku-cell.selected').forEach(el => el.classList.remove('selected'));
                inp.classList.add('selected');
                document.getElementById('shokenTable').classList.add('selecting');
            });
            inp.addEventListener('mouseenter', () => {
                if (isSelecting && startCell) {
                    const end = { r: parseInt(inp.dataset.student), c: parseInt(inp.dataset.colidx) };
                    document.querySelectorAll('.toku-cell.selected').forEach(el => el.classList.remove('selected'));
                    const table = document.getElementById('shokenTable');
                    const allInps = table.querySelectorAll('.toku-cell');
                    allInps.forEach(s => {
                        const r = parseInt(s.dataset.student);
                        const c = parseInt(s.dataset.colidx);
                        if (r >= Math.min(startCell.r, end.r) && r <= Math.max(startCell.r, end.r) &&
                            c >= Math.min(startCell.c, end.c) && c <= Math.max(startCell.c, end.c)) {
                            s.classList.add('selected');
                        }
                    });
                }
            });
        });

        // 選択状態を復元
        if (savedSelected.length > 0) {
            setTimeout(() => {
                savedSelected.forEach(({ r, c }) => {
                    const el = document.querySelector(`#shokenTableBody .toku-cell[data-student="${r}"][data-colidx="${c}"]`);
                    if (el) el.classList.add('selected');
                });
            }, 5);
        }
    }

    function renderSogoShokenTable(itemName = "総合所見") {
        // 選択状態を保存
        const savedSelected = [];
        document.querySelectorAll('#shokenTableBody .shoken-cell.selected').forEach(el => {
            savedSelected.push({ r: el.dataset.student });
        });

        const term = document.getElementById('shokenTermSelector').value;
        const header = document.getElementById('shokenHeader');
        
        let headerText = "（５４字 ✕ ４行）";
        let widthEm = 54;
        let rowCount = 4;

        if (itemName === "道徳" || itemName === "外国語" || itemName === "総合的な学習") {
            headerText = "（５４字 ✕ ３行）";
            widthEm = 54;
            rowCount = 3;
        }

        let hRow = `<tr class="header-row">
            <th class="col-a record-sticky-top record-sticky-left record-corner">No</th>
            <th class="col-b record-sticky-top record-sticky-left2 record-corner" style="border-right: 2px solid red;">名前</th>
            <th class="record-sticky-top" style="font-size:0.9rem; border-right: 2px solid black;">${headerText}</th>
        </tr>`;
        header.innerHTML = hRow;

        const body = document.getElementById('shokenTableBody');
        body.innerHTML = '';
        
        const calcCharCount = (text) => {
            if (!text) return 0;
            const lines = text.split('\n');
            let count = 0;
            for (let j = 0; j < lines.length; j++) {
                const line = lines[j];
                if (j === lines.length - 1) {
                    count += line.length;
                } else {
                    const linesUsed = Math.max(1, Math.ceil(line.length / widthEm));
                    count += linesUsed * widthEm;
                }
            }
            return count;
        };

        for (let i = 1; i <= studentCount; i++) {
            const rowIdx = i + headerRowsCount;
            const name = cellDataStorage[`${rowIdx}-B`] || "";
            const tr = document.createElement('tr');
            
            const k = `shoken_${term}_${rowIdx}_${itemName}`;
            let val = cellDataStorage[k] || "";
            
            const charCount = calcCharCount(val);

            tr.innerHTML = `<td class="col-a record-sticky-left">${i}</td>
            <td class="col-b record-sticky-left2" style="border-right: 2px solid red;">
                <div>${name}</div>
                <div id="char-count-${itemName}-${rowIdx}" style="color: red; font-size: 0.8rem; margin-top: 4px;">${charCount}字</div>
            </td>`;
            
            tr.innerHTML += `<td style="border-right: 2px solid black; padding: 0;">
                <textarea class="select-cell shoken-cell" data-student="${rowIdx}" data-item="${itemName}" rows="${rowCount}" style="width: calc(${widthEm}em + 10px); height: auto; font-family: 'MS Gothic', 'Osaka－等幅', monospace; font-size: 1.00rem; resize: vertical; text-align: left; padding: 5px; box-sizing: border-box; line-height: 1.4; display: block; margin: 0 auto;">${val}</textarea>
            </td>`;
            body.appendChild(tr);
        }

        body.querySelectorAll('.shoken-cell').forEach(inp => {
            inp.addEventListener('input', (e) => {
                const { student, item } = e.target.dataset;
                cellDataStorage[`shoken_${term}_${student}_${item}`] = e.target.value;
                autoSave();

                const countDisplay = document.getElementById(`char-count-${item}-${student}`);
                if (countDisplay) {
                    countDisplay.textContent = `${calcCharCount(e.target.value)}字`;
                }
            });
            inp.addEventListener('keydown', (e) => {
                if (e.isComposing) return;
                
                const r = parseInt(inp.dataset.student);
                let nr = r;
                
                if (e.key === 'Enter') {
                    if (e.ctrlKey || e.altKey || e.metaKey || e.shiftKey) {
                        // セル内改行
                        return;
                    } else {
                        // 次の行へ移動
                        e.preventDefault();
                        nr++;
                    }
                }

                if (nr !== r) {
                    const n = document.querySelector(`.shoken-cell[data-student="${nr}"]`);
                    if (n) {
                        n.focus();
                    } else if (e.key === 'Enter') {
                        if (nr > studentCount + headerRowsCount) showSuccess();
                    }
                }
            });
            inp.addEventListener('mousedown', (e) => {
                if (e.button !== 0 && e.button !== 2) return;
                isSelecting = true;
                startCell = { r: parseInt(inp.dataset.student), c: 0 }; // 1列しかないのでcはダミー
                
                if (e.button === 2 && inp.classList.contains('selected')) {
                    return;
                }

                if (!e.shiftKey) document.querySelectorAll('.shoken-cell.selected').forEach(el => el.classList.remove('selected'));
                inp.classList.add('selected');
                document.getElementById('shokenTable').classList.add('selecting');
            });
            inp.addEventListener('mouseenter', () => {
                if (isSelecting && startCell) {
                    const end = { r: parseInt(inp.dataset.student), c: 0 };
                    document.querySelectorAll('.shoken-cell.selected').forEach(el => el.classList.remove('selected'));
                    const table = document.getElementById('shokenTable');
                    const allInps = table.querySelectorAll('.shoken-cell');
                    allInps.forEach(s => {
                        const r = parseInt(s.dataset.student);
                        if (r >= Math.min(startCell.r, end.r) && r <= Math.max(startCell.r, end.r)) {
                            s.classList.add('selected');
                        }
                    });
                }
            });
        });

        // 選択状態を復元
        if (savedSelected.length > 0) {
            setTimeout(() => {
                savedSelected.forEach(({ r }) => {
                    const el = document.querySelector(`#shokenTableBody .shoken-cell[data-student="${r}"]`);
                    if (el) el.classList.add('selected');
                });
            }, 5);
        }
    }

    function setupKeyboardShortcuts() {
        const performCopy = (e) => {
            const activeTabEl = document.querySelector('.tab-content.active');
            const activeTab = activeTabEl?.id;
            if (activeTab !== 'tab-record' && activeTab !== 'tab-behavior' && activeTab !== 'tab-yoroku' && activeTab !== 'tab-yoroku_activity' && activeTab !== 'tab-shoken') return;
            
            const selected = activeTabEl.querySelectorAll('.select-cell.selected');
            if (selected.length === 0) return;

            if (e && e.preventDefault) e.preventDefault();
            const rows = {};
            selected.forEach(cell => {
                const r = parseInt(cell.dataset.student);
                const c = parseInt(cell.dataset.colidx || 0); // shokenの場合を考慮
                if (!rows[r]) rows[r] = [];
                rows[r].push({ col: c, val: cell.value });
            });

            let htmlStr = '<table>';
            const tsvStr = Object.keys(rows)
                .sort((a, b) => parseInt(a) - parseInt(b))
                .map(r => {
                    const sortedRow = rows[r].sort((a, b) => a.col - b.col);
                    htmlStr += '<tr>' + sortedRow.map(cell => `<td>${cell.val}</td>`).join('') + '</tr>';
                    return sortedRow.map(cell => cell.val).join('\t');
                })
                .join('\n');
            htmlStr += '</table>';

            if (e && e.clipboardData) {
                e.clipboardData.setData('text/plain', tsvStr);
                e.clipboardData.setData('text/html', htmlStr);
                showStatus("選択範囲をコピーしました");
            } else if (navigator.clipboard && window.ClipboardItem) {
                const htmlBlob = new Blob([htmlStr], { type: 'text/html' });
                const textBlob = new Blob([tsvStr], { type: 'text/plain' });
                const item = new ClipboardItem({
                    'text/html': htmlBlob,
                    'text/plain': textBlob
                });
                navigator.clipboard.write([item]).then(() => {
                    showStatus("選択範囲をコピーしました");
                }).catch(err => {
                    console.error("クリップボード書き込みエラー", err);
                    const temp = document.createElement('textarea');
                    temp.value = tsvStr;
                    document.body.appendChild(temp);
                    temp.select();
                    document.execCommand('copy');
                    document.body.removeChild(temp);
                    showStatus("選択範囲をコピーしました");
                });
            } else {
                const temp = document.createElement('textarea');
                temp.value = tsvStr;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                showStatus("選択範囲をコピーしました");
            }
        };

        const performPaste = (text) => {
            const activeTabEl = document.querySelector('.tab-content.active');
            const activeTab = activeTabEl?.id;
            if (activeTab !== 'tab-record' && activeTab !== 'tab-behavior' && activeTab !== 'tab-yoroku' && activeTab !== 'tab-yoroku_activity' && activeTab !== 'tab-shoken') return;
            
            const selected = activeTabEl.querySelectorAll('.select-cell.selected');
            if (selected.length === 0) return;

            const pasteRows = text.split(/\r?\n/).map(row => row.split('\t'));
            let minR = Infinity, minC = Infinity;
            selected.forEach(cell => {
                const r = parseInt(cell.dataset.student);
                const c = parseInt(cell.dataset.colidx || 0); // shokenの場合を考慮
                if (r < minR) minR = r;
                if (c < minC) minC = c;
            });

            const allInps = activeTabEl.querySelectorAll('.select-cell');
                
            pasteRows.forEach((rowVals, rOffset) => {
                if (rowVals.length === 1 && rowVals[0] === "") return;
                rowVals.forEach((val, cOffset) => {
                    const targetR = minR + rOffset;
                    const targetC = minC + cOffset;
                    const targetCell = Array.from(allInps).find(c => parseInt(c.dataset.student) === targetR && parseInt(c.dataset.colidx || 0) === targetC);
                    if (targetCell) {
                        const cleanVal = val.trim();
                        if (activeTab === 'tab-behavior') {
                            let bVal = cleanVal;
                            const term = document.getElementById('behaviorTermSelector').value;
                            if (term === "要録") {
                                if (bVal !== '○') bVal = '';
                            } else {
                                if (bVal !== '○' && bVal !== '△') bVal = '';
                            }
                            targetCell.value = bVal;
                            const { student, item } = targetCell.dataset;
                            cellDataStorage[`behavior_${term}_${student}_${item}`] = bVal;
                        } else if (activeTab === 'tab-shoken') {
                            const { student, item } = targetCell.dataset;
                            if (item !== "まとめ") {
                                targetCell.value = cleanVal;
                                const term = document.getElementById('shokenTermSelector').value;
                                cellDataStorage[`shoken_${term}_${student}_${item}`] = cleanVal;
                            }
                        } else if (activeTab === 'tab-yoroku_activity') {
                            let aVal = cleanVal;
                            if (aVal !== '○') aVal = '';
                            targetCell.value = aVal;
                            const { student, item } = targetCell.dataset;
                            cellDataStorage[`yoroku_activity_${student}_${item}`] = aVal;
                        } else if (activeTab === 'tab-yoroku') {
                            let yVal = cleanVal.toUpperCase();
                            targetCell.value = yVal;
                            const { student, sj, item } = targetCell.dataset;
                            cellDataStorage[`yoroku_${student}_${sj}_${item}`] = yVal;
                        } else {
                            const upperVal = cleanVal.toUpperCase();
                            targetCell.value = upperVal;
                            const { student, sj, item } = targetCell.dataset;
                            const term = document.getElementById('recordTermSelector').value;
                            cellDataStorage[`record_${term}_${student}_${sj}_${item}`] = upperVal;
                        }
                    }
                });
            });
            autoSave(); 
            if (activeTab === 'tab-record') renderRecordTable();
            if (activeTab === 'tab-yoroku') renderYorokuTable();
            if (activeTab === 'tab-yoroku_activity') renderYorokuActivityTable();
            if (activeTab === 'tab-behavior') renderBehaviorTable();
            if (activeTab === 'tab-shoken') {
                const subTab = document.querySelector('.shoken-sub-tab.active');
                if (subTab) {
                    if (subTab.textContent === "特別活動") {
                        renderTokubetsuKatsudoTable();
                    } else if (subTab.textContent === "総合所見" || subTab.textContent === "道徳" || subTab.textContent === "外国語" || subTab.textContent === "総合的な学習") {
                        renderSogoShokenTable(subTab.textContent);
                    }
                }
            }
        };

        document.addEventListener('copy', performCopy);

        document.addEventListener('paste', (e) => {
            const activeTabEl = document.querySelector('.tab-content.active');
            const activeTab = activeTabEl?.id;
            if (activeTab !== 'tab-record' && activeTab !== 'tab-behavior' && activeTab !== 'tab-yoroku' && activeTab !== 'tab-yoroku_activity' && activeTab !== 'tab-shoken') return;
            
            const selected = activeTabEl.querySelectorAll('.select-cell.selected');
            if (selected.length === 0) return;

            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text');
            performPaste(text);
        });

        // --- カスタムコンテキストメニューの制御 ---
        const contextMenu = document.getElementById('customContextMenu');

        document.addEventListener('contextmenu', (e) => {
            const activeTabEl = document.querySelector('.tab-content.active');
            if (!activeTabEl) return;
            const activeTab = activeTabEl.id;
            
            if ((activeTab === 'tab-record' || activeTab === 'tab-behavior' || activeTab === 'tab-yoroku' || activeTab === 'tab-yoroku_activity' || activeTab === 'tab-shoken') && 
                e.target.classList.contains('select-cell')) {
                e.preventDefault(); // 標準のコンテキストメニューを無効化
                
                // クリックされたセルが選択範囲外なら、現在のセルのみを選択状態にする
                if (!e.target.classList.contains('selected')) {
                    if (!e.shiftKey) document.querySelectorAll('.select-cell.selected').forEach(el => el.classList.remove('selected'));
                    e.target.classList.add('selected');
                    startCell = { r: parseInt(e.target.dataset.student), c: parseInt(e.target.dataset.colidx || 0) };
                }

                // メニューの表示位置調整
                let x = e.clientX;
                let y = e.clientY;
                
                contextMenu.style.display = 'block';
                const menuWidth = contextMenu.offsetWidth;
                const menuHeight = contextMenu.offsetHeight;
                
                // 画面外にはみ出さないように補正
                if (x + menuWidth > window.innerWidth) x -= menuWidth;
                if (y + menuHeight > window.innerHeight) y -= menuHeight;
                
                contextMenu.style.left = `${x}px`;
                contextMenu.style.top = `${y}px`;
            } else {
                contextMenu.style.display = 'none';
            }
        });

        // 左クリックなどでメニューを閉じる
        document.addEventListener('click', (e) => {
            if (e.button !== 2) { // 右クリック以外
                contextMenu.style.display = 'none';
            }
        });

        // カスタムメニュー：コピー
        document.getElementById('menuCopy').addEventListener('click', () => {
            performCopy();
            contextMenu.style.display = 'none';
        });

        // カスタムメニュー：貼り付け
        document.getElementById('menuPaste').addEventListener('click', async () => {
            contextMenu.style.display = 'none';
            try {
                const text = await navigator.clipboard.readText();
                if (text) performPaste(text);
            } catch (err) {
                console.error("クリップボードアクセスエラー", err);
                alert("クリップボードへのアクセスが許可されていないか、対応していないブラウザです。Ctrl+V（またはCmd+V）を使用してください。");
            }
        });

        // カスタムメニュー：選択解除
        document.getElementById('menuDeselect').addEventListener('click', () => {
            document.querySelectorAll('.select-cell.selected').forEach(el => el.classList.remove('selected'));
            document.querySelectorAll('table.selecting').forEach(t => t.classList.remove('selecting'));
            contextMenu.style.display = 'none';
        });
    }

    function moveColumns(dir) { const next = startColIdx + dir; if (next >= 2 && next + visibleColsCount <= totalCols) { startColIdx = next; renderTable(); autoSave(); } }

    function setupSwipeGestures() {
        const wrappers = document.querySelectorAll('.table-wrapper');
        wrappers.forEach(wrapper => {
            let startX = 0; let isDragging = false;
            wrapper.addEventListener('mousedown', (e) => { 
                if (e.button !== 0) return; // 左クリック以外は無視
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'TEXTAREA') { 
                    startX = e.clientX; isDragging = true; wrapper.style.cursor = 'grabbing'; 
                } 
            });
            window.addEventListener('mouseup', (e) => { 
                if (e.button === 0) {
                    if (isDragging) {
                        const diff = startX - e.clientX;
                        if (Math.abs(diff) > 60 && wrapper.closest('#tab-entry')) moveColumns(diff > 0 ? 1 : -1);
                        isDragging = false; wrapper.style.cursor = 'default';
                    }
                }
                isSelecting = false; 
                document.querySelectorAll('table').forEach(t => t.classList.remove('selecting'));
            });
        });
    }

    function updateNavUI() {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        if(prevBtn) prevBtn.disabled = (startColIdx <= 2);
        if(nextBtn) nextBtn.disabled = (startColIdx + visibleColsCount >= totalCols);
        const sN = getColName(startColIdx); const eN = getColName(startColIdx + visibleColsCount - 1);
        const info = document.getElementById('colRangeInfo');
        if(info) info.textContent = `${sN}〜${eN}列を表示中`;
    }

    /* ===== 記録タブ（記録専用・成績には反映しない / 赤線なし・分類なし） ===== */
    let kirokuStartColIdx = 2;

    function kirokuCurrentTerm() {
        const sel = document.getElementById('kirokuTermSelector');
        return sel ? sel.value : "1学期";
    }

    function kirokuUpdateAverages() {
        const term = kirokuCurrentTerm();
        document.querySelectorAll('#kirokuTableBody .kiroku-avg').forEach(inp => {
            const cn = inp.dataset.col;
            let sum = 0, cnt = 0;
            for (let n = 1; n <= studentCount; n++) {
                const v = parseFloat(cellDataStorage[`kiroku_${term}_${n}-${cn}`]);
                if (!isNaN(v)) { sum += v; cnt++; }
            }
            inp.value = cnt > 0 ? (sum / cnt).toFixed(1) : "";
        });
    }

    function kirokuUpdateNavUI() {
        const prevBtn = document.getElementById('kirokuPrevBtn');
        const nextBtn = document.getElementById('kirokuNextBtn');
        if (prevBtn) prevBtn.disabled = (kirokuStartColIdx <= 2);
        if (nextBtn) nextBtn.disabled = (kirokuStartColIdx + visibleColsCount >= totalCols);
        const sN = getColName(kirokuStartColIdx);
        const eN = getColName(kirokuStartColIdx + visibleColsCount - 1);
        const info = document.getElementById('kirokuColRangeInfo');
        if (info) info.textContent = `${sN}〜${eN}列を表示中`;
    }

    function kirokuMoveColumns(dir) {
        const next = kirokuStartColIdx + dir;
        if (next >= 2 && next + visibleColsCount <= totalCols) {
            kirokuStartColIdx = next;
            renderKirokuTable();
        }
    }

    // 記録タブ：矢印キー移動時に選択セルを固定ヘッダー(列名40＋タイトル40＋配点設定40＝120px)の
    // 下に隠さず、見える範囲へ最小限スクロール
    function ensureKirokuCellVisible(cell) {
        const wrapper = document.querySelector('#tab-kiroku .table-wrapper');
        if (!wrapper || !cell) return;
        const td = cell.closest('td') || cell;
        const stickyTop = 120;
        const wrapRect = wrapper.getBoundingClientRect();
        const cellRect = td.getBoundingClientRect();
        const cellTop = cellRect.top - wrapRect.top;
        const cellBottom = cellRect.bottom - wrapRect.top;
        if (cellTop < stickyTop) wrapper.scrollTop -= (stickyTop - cellTop);
        else if (cellBottom > wrapper.clientHeight) wrapper.scrollTop += (cellBottom - wrapper.clientHeight);
    }

    function renderKirokuTable() {
        const term = kirokuCurrentTerm();
        const header = document.getElementById('kirokuHeaderRow');
        const body = document.getElementById('kirokuTableBody');
        if (!header || !body) return;

        // 表示中の列名を求める
        const colNames = [];
        for (let i = 0; i < visibleColsCount; i++) colNames.push(getColName(kirokuStartColIdx + i));

        // ヘッダー（No / 名前 / 列名）※縦の赤線なし
        header.innerHTML = '';
        const thNo = document.createElement('th'); thNo.className = 'col-a'; thNo.textContent = 'No';
        const thName = document.createElement('th'); thName.className = 'col-b'; thName.textContent = '名前';
        header.appendChild(thNo); header.appendChild(thName);
        colNames.forEach(cn => {
            const th = document.createElement('th'); th.className = 'col-score'; th.textContent = cn;
            header.appendChild(th);
        });

        body.innerHTML = '';

        // 入力セル生成（krow: 'title' / 'haiten' / 児童番号）
        const makeCell = (krow, colName, opts) => {
            opts = opts || {};
            const td = document.createElement('td'); td.className = 'col-score';
            if (opts.top != null) {
                td.style.position = 'sticky'; td.style.top = opts.top + 'px';
                td.style.zIndex = '8'; td.style.backgroundColor = 'white';
            }
            const inp = document.createElement('input');
            inp.type = 'text'; inp.className = 'kiroku-cell';
            inp.dataset.krow = krow; inp.dataset.col = colName;
            inp.value = cellDataStorage[`kiroku_${term}_${krow}-${colName}`] || '';
            if (opts.bold) inp.style.fontWeight = 'bold';
            if (opts.color) inp.style.color = opts.color;
            if (opts.fontSize) inp.style.fontSize = opts.fontSize;
            inp.addEventListener('input', () => {
                const key = `kiroku_${term}_${krow}-${colName}`;
                const oldV = cellDataStorage[key] || ''; // 直前の値（配点の自動反映判定に使う）
                if (inp.value === '') delete cellDataStorage[key]; else cellDataStorage[key] = inp.value;
                if (krow === 'haiten') {
                    // 配点の得点を、名前が入っている児童セルへ自動反映。
                    // ただし「空欄」または「直前の配点と同じ値（＝自動で入った値）」のセルだけを更新し、
                    // 手入力された値は変更しない（保存・同期のタイミングに左右されないようにする）。
                    const newV = inp.value;
                    for (let n = 1; n <= studentCount; n++) {
                        if (((cellDataStorage[`${n + headerRowsCount}-B`]) || '').trim() === '') continue;
                        const sk = `kiroku_${term}_${n}-${colName}`;
                        if (manualEditFlags[sk]) continue;
                        const cur = cellDataStorage[sk] || '';
                        if (cur !== '' && cur !== oldV) continue; // 手入力済みのセルは保護
                        if (newV === '') delete cellDataStorage[sk]; else cellDataStorage[sk] = newV;
                        const sInp = document.querySelector(`#kirokuTableBody .kiroku-cell[data-krow="${n}"][data-col="${colName}"]`);
                        if (sInp) sInp.value = newV;
                    }
                    kirokuUpdateAverages();
                } else if (krow !== 'title') {
                    // 児童セルの手入力を記録（配点の自動反映で上書きされないようにする）
                    manualEditFlags[key] = true;
                    kirokuUpdateAverages();
                }
                autoSave();
            });
            inp.addEventListener('keydown', (e) => {
                // 縦の移動順：タイトル → 配点設定 → 児童1〜40
                const order = ['title', 'haiten'];
                for (let n = 1; n <= studentCount; n++) order.push(String(n));
                const ri = order.indexOf(krow);
                let targetRow = krow, targetCol = colName;
                let handled = true;
                if (e.key === 'Enter' || e.key === 'ArrowDown') { if (ri < order.length - 1) targetRow = order[ri + 1]; }
                else if (e.key === 'ArrowUp') { if (ri > 0) targetRow = order[ri - 1]; }
                else if (e.key === 'ArrowRight') {
                    const idx = getColIndex(colName);
                    if (idx + 1 < totalCols) {
                        if (idx + 1 >= kirokuStartColIdx + visibleColsCount) kirokuMoveColumns(1);
                        targetCol = getColName(idx + 1);
                    }
                }
                else if (e.key === 'ArrowLeft') {
                    const idx = getColIndex(colName);
                    if (idx > 2) {
                        if (idx === kirokuStartColIdx && kirokuStartColIdx > 2) kirokuMoveColumns(-1);
                        targetCol = getColName(idx - 1);
                    } else handled = false;
                }
                else handled = false;
                if (!handled) return;
                e.preventDefault();
                if (targetRow === krow && targetCol === colName) return;
                const t = document.querySelector(`#kirokuTableBody .kiroku-cell[data-krow="${targetRow}"][data-col="${targetCol}"]`);
                if (t) {
                    t.focus({ preventScroll: true });
                    if (t.select) t.select();
                    if (targetRow !== 'title' && targetRow !== 'haiten') ensureKirokuCellVisible(t);
                }
            });
            td.appendChild(inp);
            return td;
        };

        // 左の見出しセル（No+名前ぶんをまとめる）
        const makeLabel = (text, top, color) => {
            const td = document.createElement('td'); td.colSpan = 2;
            td.textContent = text; td.style.fontWeight = 'bold'; td.style.background = '#f1f2f6';
            if (color) td.style.color = color;
            if (top != null) { td.style.position = 'sticky'; td.style.top = top + 'px'; td.style.zIndex = '8'; }
            return td;
        };

        // タイトル行（スクロール時もヘッダー直下に固定）
        const trTitle = document.createElement('tr');
        trTitle.appendChild(makeLabel('タイトル', 40, 'var(--primary-color)'));
        colNames.forEach(cn => trTitle.appendChild(makeCell('title', cn, { top: 40, bold: true, color: 'var(--primary-color)', fontSize: '1.1rem' })));
        body.appendChild(trTitle);

        // 配点設定行
        const trHaiten = document.createElement('tr');
        trHaiten.appendChild(makeLabel('配点設定', 80, '#b71c1c'));
        colNames.forEach(cn => trHaiten.appendChild(makeCell('haiten', cn, { top: 80, color: '#b71c1c' })));
        body.appendChild(trHaiten);

        // 児童行
        for (let n = 1; n <= studentCount; n++) {
            const tr = document.createElement('tr');
            if (n % 5 === 0) tr.style.borderBottom = '2px solid #b2bec3';
            const tdNo = document.createElement('td'); tdNo.className = 'col-a'; tdNo.textContent = n;
            const tdName = document.createElement('td'); tdName.className = 'col-b';
            const nameInp = document.createElement('input');
            nameInp.type = 'text'; nameInp.className = 'cell-name'; nameInp.readOnly = true;
            nameInp.value = cellDataStorage[`${n + headerRowsCount}-B`] || '';
            tdName.appendChild(nameInp);
            tr.appendChild(tdNo); tr.appendChild(tdName);
            colNames.forEach(cn => tr.appendChild(makeCell(String(n), cn)));
            body.appendChild(tr);
        }

        // 平均点行（自動計算・編集不可）
        const trAvg = document.createElement('tr');
        trAvg.appendChild(makeLabel('平均点', null, 'blue'));
        colNames.forEach(cn => {
            const td = document.createElement('td'); td.className = 'col-score';
            const inp = document.createElement('input');
            inp.type = 'text'; inp.className = 'kiroku-avg'; inp.readOnly = true;
            inp.dataset.col = cn; inp.style.color = 'blue'; inp.style.fontWeight = 'bold';
            td.appendChild(inp);
            trAvg.appendChild(td);
        });
        body.appendChild(trAvg);

        kirokuUpdateAverages();
        kirokuUpdateNavUI();
    }

    // 矢印キー移動時、選択セルが固定ヘッダー（列名40＋分類40＋タイトル40＝120px）の
    // 下に隠れたり中央へワープしたりしないよう、最小限だけスクロールして常に見える位置に保つ
    function ensureEntryCellVisible(cell) {
        const wrapper = document.querySelector('#tab-entry .table-wrapper');
        if (!wrapper || !cell) return;
        const td = cell.closest('td') || cell;
        const stickyTop = 120; // 列名行(40)＋分類行(40)＋タイトル行(40)
        const wrapRect = wrapper.getBoundingClientRect();
        const cellRect = td.getBoundingClientRect();
        const cellTop = cellRect.top - wrapRect.top;
        const cellBottom = cellRect.bottom - wrapRect.top;
        if (cellTop < stickyTop) {
            wrapper.scrollTop -= (stickyTop - cellTop);
        } else if (cellBottom > wrapper.clientHeight) {
            wrapper.scrollTop += (cellBottom - wrapper.clientHeight);
        }
    }

    function attachEventListeners() {
        const inputs = document.querySelectorAll('.input-cell');
        inputs.forEach(input => {
            input.addEventListener('input', (e) => {
                const term = termSelector.value;
                const r = parseInt(input.dataset.row); const c = input.dataset.col; 
                const k = (r > headerRowsCount && r < rowCount - 1) || (r <= headerRowsCount && c !== 'A' && c !== 'B' && c !== 'AB') ? `${term}_${r}-${c}` : `${r}-${c}`;
                cellDataStorage[k] = e.target.value;
                if (r > headerRowsCount && r < rowCount - 1 && input.classList.contains('cell-score')) manualEditFlags[k] = true;
                if (r === 1 && c !== 'AB' && c !== 'A' && c !== 'B') {
                    const scInp = document.querySelector(`.input-cell[data-row="3"][data-col="${c}"]`); let nV = "";
                    if (e.target.value.includes('：')) { const p = e.target.value.split('：'); if (subjectSettings[p[0]]) nV = subjectSettings[p[0]][p[1]]; }
                    if (nV !== "") {
                        if (scInp) scInp.value = nV; cellDataStorage[`${term}_3-${c}`] = nV;
                        for (let row = headerRowsCount + 1; row <= studentCount + headerRowsCount; row++) {
                            const sk = `${term}_${row}-${c}`; if (manualEditFlags[sk]) continue;
                            if ((cellDataStorage[`${row}-B`] || "").trim() !== "") {
                                const stIn = document.querySelector(`.input-cell[data-row="${row}"][data-col="${c}"]`);
                                if (stIn) stIn.value = nV; cellDataStorage[sk] = nV;
                            }
                        }
                    }
                }
                updateAverages(); autoSave();
            });
            input.addEventListener('keydown', (e) => {
                if (input.tagName === 'SELECT') return;
                const r = parseInt(input.dataset.row); const c = input.dataset.col;
                let nr = r; let nc = c;
                if (e.key === 'Enter' || e.key === 'ArrowDown') { e.preventDefault(); nr++; }
                else if (e.key === 'ArrowUp') { e.preventDefault(); nr--; }
                else if (e.key === 'ArrowRight') { e.preventDefault(); if (c === 'A') nc = 'B'; else if (c === 'B' || c === 'AB') nc = getColName(startColIdx); else { const idx = getColIndex(c); if (idx + 1 >= startColIdx + visibleColsCount) moveColumns(1); nc = getColName(idx + 1); } }
                else if (e.key === 'ArrowLeft') { e.preventDefault(); if (c === 'B') nc = 'A'; else if (c !== 'A' && c !== 'AB') { const idx = getColIndex(c); if (idx === startColIdx) { if (startColIdx > 2) { moveColumns(-1); nc = getColName(idx - 1); } else nc = 'B'; } else nc = getColName(idx - 1); } }
                if (nr !== r || nc !== c) {
                    const s = nc === 'AB' ? `.input-cell[data-row="${nr}"][data-col=\"AB\"]` : `.input-cell[data-row="${nr}"][data-col="${nc}"]`;
                    const n = document.querySelector(s); if (n) { n.focus({ preventScroll: true }); if (n.select) n.select(); if (nr > 2) ensureEntryCellVisible(n); } else if (nr > rowCount) showSuccess();
                }
            });
            input.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return; // 左クリック以外は無視
                isSelecting = true; 
                startCell = { r: parseInt(input.dataset.row), c: input.dataset.col };
                if (!e.shiftKey) document.querySelectorAll('.input-cell.selected').forEach(el => el.classList.remove('selected'));
                input.classList.add('selected'); 
                const tableId = e.target.closest('table')?.id;
                if (tableId) document.getElementById(tableId).classList.add('selecting');
            });
            input.addEventListener('mouseenter', () => {
                if (isSelecting && startCell) {
                    const end = { r: parseInt(input.dataset.row), c: input.dataset.col };
                    document.querySelectorAll('.input-cell.selected').forEach(el => el.classList.remove('selected'));
                    const minR = Math.min(startCell.r, end.r); const maxR = Math.max(startCell.r, end.r);
                    for (let row = minR; row <= maxR; row++) {
                        const t = document.querySelector(`.input-cell[data-row="${row}"][data-col="${end.c}"]`);
                        if (t) t.classList.add('selected');
                    }
                }
            });
        });
    }

    termSelector.addEventListener('change', () => { 
        criteriaTermSelector.value = termSelector.value; 
        recordTermSelector.value = termSelector.value; 
        if(shokenTermSelector) shokenTermSelector.value = termSelector.value;
        renderTable(); 
        autoSave(); 
    });
    criteriaTermSelector.addEventListener('change', () => { 
        if (criteriaTermSelector.value !== "要録") {
            termSelector.value = criteriaTermSelector.value; 
            recordTermSelector.value = criteriaTermSelector.value; 
            if(shokenTermSelector) shokenTermSelector.value = criteriaTermSelector.value;
        }
        renderCriteriaTable(); 
        autoSave(); 
    });
    recordTermSelector.addEventListener('change', () => { 
        termSelector.value = recordTermSelector.value; 
        criteriaTermSelector.value = recordTermSelector.value; 
        if(shokenTermSelector) shokenTermSelector.value = recordTermSelector.value;
        renderRecordTable(); 
        autoSave(); 
    });
    if (behaviorTermSelector) {
        behaviorTermSelector.addEventListener('change', () => { 
            renderBehaviorTable(); 
            autoSave(); 
        });
    }
    if (shokenTermSelector) {
        shokenTermSelector.addEventListener('change', () => {
            termSelector.value = shokenTermSelector.value;
            criteriaTermSelector.value = shokenTermSelector.value;
            recordTermSelector.value = shokenTermSelector.value;
            autoSave();
            
            const activeTab = document.querySelector('.shoken-sub-tab.active');
            if (activeTab) {
                if (activeTab.textContent === "特別活動") {
                    renderTokubetsuKatsudoTable();
                } else if (activeTab.textContent === "総合所見" || activeTab.textContent === "道徳" || activeTab.textContent === "外国語" || activeTab.textContent === "総合的な学習") {
                    renderSogoShokenTable(activeTab.textContent);
                }
            }
        });
    }
    const kirokuTermSelector = document.getElementById('kirokuTermSelector');
    if (kirokuTermSelector) {
        // 記録タブの学期切替は独立（他タブの学期には影響しない）
        kirokuTermSelector.addEventListener('change', () => { renderKirokuTable(); });
    }
    gradeSelector.addEventListener('change', () => { renderSubjectSettings(); renderTable(); renderShokenTabs(); autoSave(); });

    function copyTableData() {
        const rows = document.querySelectorAll('#gradeTable tr'); let tsv = "";
        rows.forEach((row, i) => { if (i === 0) return; const rowData = []; row.querySelectorAll('input, select').forEach(inp => rowData.push(inp.value)); tsv += rowData.join('\t') + '\n'; });
        const temp = document.createElement('textarea'); temp.value = tsv; document.body.appendChild(temp); temp.select(); document.execCommand('copy'); document.body.removeChild(temp);
        showStatus("全データをコピーしました");
    }

    function showStatus(msg) { statusMsg.textContent = msg; statusMsg.style.display = 'block'; setTimeout(() => { statusMsg.style.display = 'none'; }, 3000); }

    async function resetApp() {
        if (confirm("リセットしますか？\n（端末・クラウド両方のデータを削除します）")) {
            cellDataStorage = {}; manualEditFlags = {}; startColIdx = 2;
            criteriaSettings = {"1学期":{}, "2学期":{}, "3学期":{}, "要録":{}};
            try { localStorage.removeItem('seisekiAppData'); } catch (e) {}
            if (lastUser && !saveDisabled) {
                const sR = doc(db, 'artifacts', appId, 'users', lastUser.uid);
                await setDoc(sR, { cellDataStorage: {}, manualEditFlags: {}, criteriaSettings: {}, updatedAt: new Date() });
            }
            renderSubjectSettings(); renderTable(); renderShokenTabs(); showStatus("リセット完了");
        }
    }

    function importStudentsFromPaste() {
        const textarea = document.getElementById('studentPasteArea');
        const text = textarea.value.trim();
        if (!text) { alert("貼り付けエリアにデータがありません。"); return; }

        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        if (lines.length === 0) { alert("有効なデータがありません。"); return; }

        let imported = 0;
        lines.forEach((line, idx) => {
            const cols = line.split(/\t/);
            let no, name;

            if (cols.length >= 2) {
                // 2列以上：1列目＝出席番号、2列目＝名前
                const parsedNo = parseInt(cols[0].trim());
                if (!isNaN(parsedNo) && parsedNo >= 1 && parsedNo <= studentCount) {
                    no = parsedNo;
                    name = cols[1].trim();
                } else {
                    // 1列目が番号でない場合、行順を出席番号にする
                    no = idx + 1;
                    name = cols[0].trim();
                }
            } else {
                // 1列のみ：名前だけ、行順を出席番号にする
                no = idx + 1;
                name = cols[0].trim();
            }

            if (no >= 1 && no <= studentCount && name !== "") {
                const rowIdx = no + headerRowsCount;
                cellDataStorage[`${rowIdx}-A`] = no;
                cellDataStorage[`${rowIdx}-B`] = name;
                imported++;
            }
        });

        if (imported > 0) {
            autoSave();
            renderSubjectSettings();
            renderTable();
            showStatus(`${imported}名の児童を読み込みました`);
            textarea.value = "";
        } else {
            alert("読み込めるデータがありませんでした。\n形式を確認してください。");
        }
    }

    function clearPasteArea() {
        document.getElementById('studentPasteArea').value = "";
    }

    function showSuccess() { soundCorrect.play(); confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); }

    window.copyTableData = copyTableData; window.resetApp = resetApp; window.moveColumns = moveColumns;
    window.switchTab = switchTab; window.toggleAuthModal = toggleAuthModal;
    window.kirokuMoveColumns = kirokuMoveColumns;
    window.handleEmailLogin = handleEmailLogin; window.handleEmailRegister = handleEmailRegister;
    window.handlePasswordReset = handlePasswordReset; window.toggleBGrades = toggleBGrades;
    window.toggleYorokuGrades = toggleYorokuGrades;
    window.importStudentsFromPaste = importStudentsFromPaste;
    window.clearPasteArea = clearPasteArea;
    window.onload = initTable;
</script>
